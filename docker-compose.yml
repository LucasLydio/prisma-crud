services:
  db:
    image: postgres:16
    container_name: prisma-crud-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todo-list}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prisma_crud_db_data:/var/lib/postgresql/data

volumes:
  prisma_crud_db_data:

